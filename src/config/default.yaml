project:
  name: hallucination_aware_multimodal_rag
  seed: 42
  device: cpu

dataset:
  path: data/sample_dataset.json
  format: json
  chunk_size: 24
  chunk_overlap: 4
  max_items: 100
  image_base_dir: data

encoder:
  model_type: clip
  model_name: openai/clip-vit-base-patch32
  normalize: true

retrieval:
  index_type: flat
  top_k: 5
  multimodal_alpha: 0.5

reasoning:
  max_hops: 3
  min_confidence: 0.35

hallucination:
  similarity_threshold: 0.25
  contradiction_threshold: 0.5
  nli_model: cross-encoder/nli-deberta-v3-base
  enable_nli: false

uncertainty:
  temperature: 1.0

reflection:
  max_iterations: 2
  refinement_confidence_threshold: 0.5

explainability:
  include_trace: true

entities:
  top_k: 3
  min_len: 3

evaluation:
  max_items: 10
